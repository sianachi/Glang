# LSP service — analyses documents (no code execution, no disk writes), so it can
# run fully read-only. Can scale to multiple replicas since each WebSocket session
# is independent (sticky routing not required; clients hold one long-lived socket).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsp
  labels:
    app: lsp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lsp
  template:
    metadata:
      labels:
        app: lsp
    spec:
      automountServiceAccountToken: false
      # Public GHCR packages need no pull secret (see run.yaml for the private case).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: lsp
          image: glang-lsp            # rewritten by kustomize
          args: ["--port", "8082"]
          ports:
            - containerPort: 8082
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 2
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lsp            # MUST be "lsp": the frontend nginx proxies to http://lsp:8082
  labels:
    app: lsp
spec:
  selector:
    app: lsp
  ports:
    - name: http
      port: 8082
      targetPort: 8082
