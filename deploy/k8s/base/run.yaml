# Run service — interprets untrusted user code. Most hardened of the three:
# non-root, read-only rootfs (with a writable emptyDir /tmp for the source file it
# writes before interpreting), all capabilities dropped, and resource-capped so a
# runaway program can't exhaust the node. The interpreter's step budget bounds CPU.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: run
  labels:
    app: run
spec:
  replicas: 1
  selector:
    matchLabels:
      app: run
  template:
    metadata:
      labels:
        app: run
    spec:
      automountServiceAccountToken: false
      # Public GHCR packages need no pull secret. If private, create a
      # docker-registry secret named `ghcr-pull` and uncomment:
      # imagePullSecrets:
      #   - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: run
          image: glang-run            # rewritten by kustomize -> ghcr.io/.../glang-run:TAG
          args: ["--port", "8081", "--stdlib", "/app/stdlib", "--tmp", "/tmp", "--max-steps", "1000000"]
          ports:
            - containerPort: 8081
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: run            # MUST be "run": the frontend nginx proxies to http://run:8081
  labels:
    app: run
spec:
  selector:
    app: run
  ports:
    - name: http
      port: 8081
      targetPort: 8081
