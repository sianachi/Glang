server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Run service: POST /api/run -> the GLang interpreter container.
    location /api/ {
        proxy_pass http://run:8081;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # LSP service: WebSocket upgrade -> the GLang LSP container.
    location /lsp {
        proxy_pass http://lsp:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA: serve the static bundle, falling back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
